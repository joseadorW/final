<div class="formulario-contacto">
  <h2>Dejá tu comentario</h2>
  <form action="../recibir/index.html" method="GET">
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="gmail">Correo Gmail:</label>
    <input type="email" id="gmail" name="gmail" pattern=".+@gmail\.com" required>

    <label for="comentario">Comentario:</label>
    <textarea id="comentario" name="comentario" rows="5" required></textarea>

    <button type="submit">Enviar</button> <a href="../recibir/index.html"></a>
  </form>
</div>
<footer>May the Force be with you </footer>
